<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ automat_name }}</title>
    <style>
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2d3148; --text:#e4e6f0;
                --text-dim:#8b8fa3; --accent:#6c8aff; --red:#f87171; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'SF Mono','Fira Code',monospace; background:var(--bg);
               color:var(--text); min-height:100vh; display:flex;
               align-items:center; justify-content:center; }
        .card { background:var(--surface); border:1px solid var(--border);
                border-radius:14px; padding:32px; width:320px; }
        h1 { font-size:16px; margin-bottom:4px; }
        .sub { font-size:12px; color:var(--text-dim); margin-bottom:20px; }
        label { font-size:11px; color:var(--text-dim); text-transform:uppercase;
                letter-spacing:1px; }
        input { width:100%; margin-top:6px; margin-bottom:16px; padding:11px 12px;
                background:var(--bg); border:1px solid var(--border); border-radius:8px;
                color:var(--text); font-family:inherit; font-size:14px; }
        input:focus { outline:none; border-color:var(--accent); }
        button { width:100%; padding:11px; background:var(--accent); border:none;
                 border-radius:8px; color:#fff; font-weight:600; font-size:14px;
                 cursor:pointer; font-family:inherit; }
        button:hover { opacity:.9; }
        .error { color:var(--red); font-size:12px; margin-bottom:12px; }
    </style>
</head>
<body>
    <form class="card" method="post">
        <h1>{{ automat_name }}</h1>
        <div class="sub">MDB Dashboard &middot; Anmeldung</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" autofocus required>
        <button type="submit">Anmelden</button>
    </form>
</body>
</html>
